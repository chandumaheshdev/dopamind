<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dopamind — Gentle Productivity</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<script type="module" src="https://unpkg.com/@capacitor/core@latest/dist/capacitor.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🌙</span>
        <span class="logo-text">Dopamind</span>
      </div>
      <p class="tagline">gentle productivity for wandering minds</p>
    </header>

    <!-- Main Tabs -->
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="baker">
        <span>🍰</span> Task Baker
      </button>
      <button class="tab-btn" data-tab="timer">
        <span>⏳</span> Soft Timer
      </button>
      <button class="tab-btn" data-tab="parking">
        <span>🅿️</span> Parking Lot
      </button>
    </nav>

    <!-- Task Baker -->
    <section id="baker" class="tab-panel active">
      <div class="baker-input-area">
        <label for="big-task">what needs doing?</label>
        <input type="text" id="big-task" placeholder="e.g., write quarterly report" autocomplete="off">
        <button id="bake-btn" class="primary-btn">
          <span>✨</span> Bake into Steps
        </button>
      </div>

      <div id="micro-tasks" class="micro-tasks-list"></div>

      <div class="energy-picker">
        <p>how does your energy feel right now?</p>
        <div class="energy-buttons">
          <button class="energy-btn" data-energy="high">⚡ High</button>
          <button class="energy-btn" data-energy="medium">🌤️ Medium</button>
          <button class="energy-btn" data-energy="low">🌙 Low</button>
        </div>
      </div>
    </section>

    <!-- Soft Timer -->
    <section id="timer" class="tab-panel">
      <div class="timer-container">
        <div class="timer-visual">
          <svg viewBox="0 0 200 200" class="timer-svg">
            <circle class="timer-track" cx="100" cy="100" r="85"/>
            <circle class="timer-fill" cx="100" cy="100" r="85" id="timer-circle"/>
          </svg>
          <div class="timer-center">
            <span id="timer-display">25:00</span>
            <small>gentle focus</small>
          </div>
        </div>

        <div class="timer-controls">
          <button id="timer-start" class="timer-btn primary">▶ Start</button>
          <button id="timer-pause" class="timer-btn secondary" disabled>⏸ Pause</button>
          <button id="timer-reset" class="timer-btn secondary">↺ Reset</button>
        </div>

        <div class="timer-presets">
          <button class="preset-btn" data-min="5">5 min</button>
          <button class="preset-btn active" data-min="25">25 min</button>
          <button class="preset-btn" data-min="45">45 min</button>
        </div>
      </div>
    </section>

    <!-- Parking Lot -->
    <section id="parking" class="tab-panel">
      <div class="parking-input-area">
        <label for="brain-dump">brain dump — anything nagging you?</label>
        <input type="text" id="brain-dump" placeholder="remember to call mom, buy milk, that idea about..." autocomplete="off">
        <button id="park-btn" class="primary-btn">
          <span>🅿️</span> Park It
        </button>
      </div>

      <div id="parked-items" class="parked-list">
        <p class="empty-state">your parking lot is empty. that’s okay.</p>
      </div>

      <div class="parking-actions">
        <button id="sort-parked" class="secondary-btn">Auto-Sort</button>
        <button id="clear-parked" class="danger-btn">Clear All</button>
      </div>
    </section>

    <!-- Tiny Win Toast -->
    <div id="win-toast" class="win-toast"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
